<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>EduGenerate AI</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto',
                    'Helvetica', 'Arial', sans-serif;
                background: #19191f;
                color: #ececf1;
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            /* Header */
            .header {
                background: #202123;
                padding: 12px 20px;
                border-bottom: 1px solid #4d4d4f;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .header h1 {
                font-size: 18px;
                font-weight: 600;
                color: #ececf1;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .logo {
                font-size: 24px;
            }

            .new-chat-btn {
                background: transparent;
                border: 1px solid #565869;
                color: #ececf1;
                padding: 8px 16px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 14px;
                transition: all 0.2s;
            }

            .new-chat-btn:hover {
                background: #40414f;
            }

            /* Chat Container */
            .chat-container {
                flex: 1;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                padding-bottom: 20px;
            }

            .chat-container::-webkit-scrollbar {
                width: 8px;
            }

            .chat-container::-webkit-scrollbar-track {
                background: #343541;
            }

            .chat-container::-webkit-scrollbar-thumb {
                background: #565869;
                border-radius: 4px;
            }

            /* Welcome Screen */
            .welcome-screen {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
                padding: 20px;
            }

            .welcome-screen h2 {
                font-size: 32px;
                margin-bottom: 40px;
                color: #ececf1;
            }

            .suggestions {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 12px;
                max-width: 800px;
                width: 100%;
            }

            .suggestion-card {
                background: #3e3f4b;
                border: 1px solid #565869;
                border-radius: 8px;
                padding: 16px;
                cursor: pointer;
                transition: all 0.2s;
            }

            .suggestion-card:hover {
                background: #40414f;
                border-color: #676879;
            }

            .suggestion-card h3 {
                font-size: 14px;
                font-weight: 500;
                margin-bottom: 8px;
                color: #ececf1;
            }

            .suggestion-card p {
                font-size: 12px;
                color: #c5c5d2;
            }

            /* Messages */
            .message {
                padding: 24px;
                border-bottom: 1px solid #4d4d4f;
                animation: slideIn 0.3s ease;
            }

            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .message-content {
                max-width: 800px;
                margin: 0 auto;
                display: flex;
                gap: 24px;
            }

            .message.user {
                background: #343541;
            }

            .message.assistant {
                background: #1f1f21;
            }

            .avatar {
                width: 32px;
                height: 32px;
                border-radius: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                flex-shrink: 0;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }

            .message.user .avatar {
                background: #5c5c7a;
            }

            .message-text {
                flex: 1;
                line-height: 1.7;
                font-size: 16px;
                word-wrap: break-word;
                padding-top: 4px;
            }

            /* Loading Animation */
            .loading-dots {
                display: inline-flex;
                gap: 4px;
                align-items: center;
            }

            .loading-dots span {
                width: 8px;
                height: 8px;
                background: #ececf1;
                border-radius: 50%;
                animation: bounce 1.4s infinite ease-in-out;
            }

            .loading-dots span:nth-child(1) {
                animation-delay: -0.32s;
            }

            .loading-dots span:nth-child(2) {
                animation-delay: -0.16s;
            }

            @keyframes bounce {
                0%,
                80%,
                100% {
                    transform: scale(0.6);
                    opacity: 0.5;
                }
                40% {
                    transform: scale(1);
                    opacity: 1;
                }
            }

            /* Input Area */
            .input-area {
                padding: 20px;
                background: #343541;
                border-top: 1px solid #4d4d4f;
            }

            .input-container {
                max-width: 800px;
                margin: 0 auto;
                position: relative;
            }

            #prompt {
                width: 100%;
                padding: 16px 50px 16px 20px;
                background: #40414f;
                border: 1px solid #565869;
                border-radius: 12px;
                color: #ececf1;
                font-size: 16px;
                font-family: inherit;
                outline: none;
                resize: none;
                max-height: 200px;
                transition: all 0.2s;
            }

            #prompt:focus {
                border-color: #676879;
                box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            }

            #prompt::placeholder {
                color: #8e8ea0;
            }

            .send-btn {
                position: absolute;
                right: 12px;
                bottom: 12px;
                width: 36px;
                height: 36px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border: none;
                border-radius: 8px;
                color: white;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.2s;
            }

            .send-btn:hover:not(:disabled) {
                transform: scale(1.05);
                box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            }

            .send-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                background: #565869;
            }

            .send-icon {
                width: 20px;
                height: 20px;
            }

            /* Footer */
            .footer {
                text-align: center;
                padding: 12px;
                font-size: 12px;
                color: #8e8ea0;
                background: #343541;
            }
        </style>
    </head>
    <body>
        <!-- Header -->
        <div class="header">
            <h1><span class="logo">🎓</span>EduGenerate AI</h1>
            <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
        </div>

        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer">
            <div class="welcome-screen" id="welcomeScreen">
                <h2>How can I help you today?</h2>
                <div class="suggestions">
                    <div
                        class="suggestion-card"
                        onclick="
                            sendSuggestion(
                                'Explain quantum computing in simple terms',
                            )
                        "
                    >
                        <h3>💡 Explain a Concept</h3>
                        <p>Quantum computing in simple terms</p>
                    </div>
                    <div
                        class="suggestion-card"
                        onclick="
                            sendSuggestion(
                                'Write a Python function to sort a list',
                            )
                        "
                    >
                        <h3>💻 Code Helper</h3>
                        <p>Write a Python function</p>
                    </div>
                    <div
                        class="suggestion-card"
                        onclick="
                            sendSuggestion('What are the benefits of exercise?')
                        "
                    >
                        <h3>🏃 Health Tips</h3>
                        <p>Benefits of regular exercise</p>
                    </div>
                    <div
                        class="suggestion-card"
                        onclick="
                            sendSuggestion('Give me a creative writing prompt')
                        "
                    >
                        <h3>✨ Creative Ideas</h3>
                        <p>Generate a writing prompt</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-container">
                <textarea
                    id="prompt"
                    placeholder="Message EduGenerate AI..."
                    rows="1"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="generate()">
                    <svg
                        class="send-icon"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            EduGenerate AI - Your intelligent learning companion
        </div>

        <script>
            const chatContainer = document.getElementById('chatContainer');
            const welcomeScreen = document.getElementById('welcomeScreen');
            const promptInput = document.getElementById('prompt');
            const sendBtn = document.getElementById('sendBtn');

            // Auto-resize textarea
            promptInput.addEventListener('input', function () {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 200) + 'px';
            });

            function sendSuggestion(text) {
                promptInput.value = text;
                generate();
            }

            function newChat() {
                chatContainer.innerHTML = '';
                welcomeScreen.style.display = 'flex';
                chatContainer.appendChild(welcomeScreen);
                promptInput.value = '';
            }

            function addMessage(text, isUser) {
                if (welcomeScreen.style.display !== 'none') {
                    welcomeScreen.style.display = 'none';
                }

                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
                messageDiv.innerHTML = `
                    <div class="message-content">
                        <div class="avatar">${isUser ? '👤' : '🎓'}</div>
                        <div class="message-text">${text}</div>
                    </div>
                `;
                chatContainer.appendChild(messageDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                return messageDiv;
            }

            function addLoadingMessage() {
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'message assistant';
                loadingDiv.id = 'loading';
                loadingDiv.innerHTML = `
                    <div class="message-content">
                        <div class="avatar">🎓</div>
                        <div class="message-text">
                            <div class="loading-dots">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                        </div>
                    </div>
                `;
                chatContainer.appendChild(loadingDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                return loadingDiv;
            }

            async function generate() {
                const prompt = promptInput.value.trim();
                if (!prompt) return;

                // Disable input
                sendBtn.disabled = true;
                promptInput.disabled = true;

                // Add user message
                addMessage(prompt, true);

                // Clear input
                promptInput.value = '';
                promptInput.style.height = 'auto';

                // Add loading indicator
                const loadingMsg = addLoadingMessage();

                try {
                    const res = await fetch('http://127.0.0.1:8000/generate', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ text: prompt }),
                    });

                    const data = await res.json();

                    // Remove loading
                    loadingMsg.remove();

                    // Add AI response
                    addMessage(data.response, false);
                } catch (error) {
                    loadingMsg.remove();
                    addMessage('❌ Error: ' + error.message, false);
                } finally {
                    sendBtn.disabled = false;
                    promptInput.disabled = false;
                    promptInput.focus();
                }
            }

            // Enter to send (Shift+Enter for new line)
            promptInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    generate();
                }
            });

            // Focus input on load
            promptInput.focus();
        </script>
    </body>
</html>
